name: ExamGov Nightly Scraper

on:
  schedule:
    # Runs every night at 1:00 AM UTC (6:30 AM IST) — free GitHub Actions runners
    - cron: '0 1 * * *'
  workflow_dispatch:
    # Allows one-click manual trigger from the Actions tab in GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Setup Node.js environment (v20 LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci || npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Execute nightly scraping script
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: node scraper.js

      - name: Send email reminders for exams closing in 3 days
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DEPLOY_URL: ${{ vars.DEPLOY_URL || 'http://localhost:3000' }}
        run: |
          echo "Checking for exams closing in 3 days and dispatching email reminders..."
          curl -sS -X GET "$DEPLOY_URL/api/check-reminders" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --connect-timeout 10 \
            --max-time 60 || echo "Reminder check skipped (deployment may not be live)"
